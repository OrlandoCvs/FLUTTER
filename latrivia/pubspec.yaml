name: latrivia
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 

flutter:
  uses-material-design: true
  assets:
    - images/ # Carpeta para el logo de la Unison y el icono

# Configuración del icono
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo_unison.png"
  image_path: "images/icono_app.png"
  adaptive_icon_background: "#FFF7CD"